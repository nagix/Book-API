$kind: http-request
name: API Root
method: GET
url: '{{baseUrl}}/'
order: 2000
examples: ./.resources/API Root.resources/examples
events:
  post-response:
    script: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response time is under 500ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });

      pm.test("Response has JSON content-type", () => {
        pm.response.to.have.header("Content-Type");
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Body has message field", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("message");
        pm.expect(json.message).to.be.a("string").and.not.empty;
      });

      pm.test("Body has docs field", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("docs");
        pm.expect(json.docs).to.be.a("string").and.not.empty;
      });