$kind: http-request
name: Health Check
method: GET
url: '{{baseUrl}}/health'
order: 1000
examples: ./.resources/Health Check.resources/examples
events:
  post-response:
    script: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response time is under 500ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });

      pm.test("Response has JSON content-type", () => {
        pm.response.to.have.header("Content-Type");
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Body has status 'ok'", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("status", "ok");
      });

      pm.test("Body has a timestamp", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("timestamp");
        pm.expect(new Date(json.timestamp).toString()).to.not.equal("Invalid Date");
      });