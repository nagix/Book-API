$kind: http-request
name: Delete Book
method: DELETE
url: '{{baseUrl}}/api/v1/books/{{bookId}}'
order: 5000
examples: ./.resources/Delete Book.resources/examples
events:
  post-response:
    script: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response time is under 500ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });

      pm.test("Response has JSON content-type", () => {
        pm.response.to.have.header("Content-Type");
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Body has message field", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("message");
        pm.expect(json.message).to.be.a("string").and.not.empty;
      });

      pm.test("Body has id field matching deleted bookId", () => {
        const json = pm.response.json();
        const bookId = pm.collectionVariables.get("bookId");
        pm.expect(json).to.have.property("id");
        pm.expect(json.id).to.equal(bookId);
      });

      pm.test("Clear bookId collection variable after deletion", () => {
        pm.collectionVariables.set("bookId", "");
        pm.expect(pm.collectionVariables.get("bookId")).to.equal("");
      });