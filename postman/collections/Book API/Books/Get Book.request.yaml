$kind: http-request
name: Get Book
method: GET
url: '{{baseUrl}}/api/v1/books/{{bookId}}'
order: 2000
examples: ./.resources/Get Book.resources/examples
events:
  post-response:
    script: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response time is under 500ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });

      pm.test("Response has JSON content-type", () => {
        pm.response.to.have.header("Content-Type");
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Body has book object", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("book");
        pm.expect(json.book).to.be.an("object");
      });

      pm.test("Book has all required fields", () => {
        const book = pm.response.json().book;
        pm.expect(book).to.have.property("id");
        pm.expect(book).to.have.property("title");
        pm.expect(book).to.have.property("author");
        pm.expect(book.id).to.be.a("string").and.not.empty;
        pm.expect(book.title).to.be.a("string").and.not.empty;
        pm.expect(book.author).to.be.a("string").and.not.empty;
      });

      pm.test("Book id matches requested bookId", () => {
        const book = pm.response.json().book;
        const bookId = pm.collectionVariables.get("bookId");
        pm.expect(book.id).to.equal(bookId);
      });

      pm.test("year field is null or a non-negative integer", () => {
        const book = pm.response.json().book;
        if (book.year !== null) {
          pm.expect(book.year).to.be.a("number");
          pm.expect(Number.isInteger(book.year)).to.be.true;
          pm.expect(book.year).to.be.at.least(0);
        }
      });